name: Daily Digest

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = 北京 09:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m src.main

      - name: Commit & push if changed
        run: |
          git config user.name "Miss Ling Bot"
          git config user.email "bot@miss-ling-ai-daily"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: daily digest $(date +'%Y-%m-%d')"
          git push
